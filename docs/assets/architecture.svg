<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 600" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arrowDashed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <style>
      .lane { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1; }
      .lane-title { fill: #64748b; font-size: 11px; font-weight: 600; letter-spacing: 0.5px; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 1.5; rx: 6; }
      .box-ai { fill: #fef3c7; stroke: #b45309; stroke-width: 1.5; rx: 6; }
      .box-store { fill: #e0f2fe; stroke: #0369a1; stroke-width: 1.5; rx: 6; }
      .box-ext { fill: #ede9fe; stroke: #6d28d9; stroke-width: 1.5; rx: 6; stroke-dasharray: 4 3; }
      .label { fill: #0f172a; font-weight: 600; font-size: 13px; }
      .sub { fill: #475569; font-size: 11px; }
      .edge { stroke: #475569; stroke-width: 1.5; fill: none; }
      .edge-dashed { stroke: #94a3b8; stroke-width: 1.5; fill: none; stroke-dasharray: 5 4; }
      .edge-label { fill: #475569; font-size: 11px; }
      .legend { fill: #475569; font-size: 11px; }
    </style>
  </defs>

  <text x="20" y="28" font-size="18" font-weight="700" fill="#0f172a">Item Comparison API — runtime architecture</text>
  <text x="20" y="46" class="sub">Spring Boot 3.3.5 · Java 21 · in-process H2 + Caffeine · OpenAI optional</text>

  <rect class="lane" x="20" y="70" width="940" height="80"/>
  <text x="32" y="88" class="lane-title">CLIENT</text>
  <rect class="lane" x="20" y="160" width="940" height="80"/>
  <text x="32" y="178" class="lane-title">CONTROLLER (REST + RFC 7807 + OpenAPI)</text>
  <rect class="lane" x="20" y="250" width="940" height="120"/>
  <text x="32" y="268" class="lane-title">SERVICE (orchestration + pure functions)</text>
  <rect class="lane" x="20" y="380" width="940" height="100"/>
  <text x="32" y="398" class="lane-title">PERSISTENCE / CACHE / EXTERNAL</text>

  <rect class="box" x="420" y="100" width="160" height="40"/>
  <text x="500" y="118" text-anchor="middle" class="label">HTTP client</text>
  <text x="500" y="133" text-anchor="middle" class="sub">curl · Swagger UI · frontend</text>

  <rect class="box" x="60"  y="190" width="180" height="40"/>
  <text x="150" y="208" text-anchor="middle" class="label">ProductController</text>
  <text x="150" y="223" text-anchor="middle" class="sub">/products · /products/{id}</text>

  <rect class="box" x="280" y="190" width="180" height="40"/>
  <text x="370" y="208" text-anchor="middle" class="label">CompareController</text>
  <text x="370" y="223" text-anchor="middle" class="sub">/products/compare</text>

  <rect class="box" x="500" y="190" width="220" height="40"/>
  <text x="610" y="208" text-anchor="middle" class="label">CategoryInsightsController</text>
  <text x="610" y="223" text-anchor="middle" class="sub">/products/category-insights</text>

  <rect class="box" x="760" y="190" width="180" height="40"/>
  <text x="850" y="208" text-anchor="middle" class="label">GlobalExceptionHandler</text>
  <text x="850" y="223" text-anchor="middle" class="sub">RFC 7807 problem details</text>

  <rect class="box" x="60"  y="285" width="180" height="40"/>
  <text x="150" y="303" text-anchor="middle" class="label">ProductService</text>
  <text x="150" y="318" text-anchor="middle" class="sub">getById · getAllByCategory</text>

  <rect class="box" x="280" y="285" width="180" height="40"/>
  <text x="370" y="303" text-anchor="middle" class="label">CompareService</text>
  <text x="370" y="318" text-anchor="middle" class="sub">+ DifferencesCalculator</text>

  <rect class="box" x="500" y="285" width="220" height="40"/>
  <text x="610" y="303" text-anchor="middle" class="label">CategoryInsightsService</text>
  <text x="610" y="318" text-anchor="middle" class="sub">rankings · topItems · picks · filters</text>

  <rect class="box" x="60"  y="335" width="180" height="30"/>
  <text x="150" y="354" text-anchor="middle" class="sub">BuyBoxSelector · FieldSetProjector</text>

  <rect class="box-ai" x="280" y="335" width="440" height="30"/>
  <text x="500" y="354" text-anchor="middle" class="label">SummaryService (LLM gateway · timeout · cache · fallback · metrics)</text>

  <rect class="box-store" x="60"  y="410" width="180" height="50"/>
  <text x="150" y="430" text-anchor="middle" class="label">H2 (in-mem)</text>
  <text x="150" y="446" text-anchor="middle" class="sub">CatalogProduct · Offer (JPA)</text>

  <rect class="box-store" x="280" y="410" width="180" height="50"/>
  <text x="370" y="430" text-anchor="middle" class="label">Caffeine</text>
  <text x="370" y="446" text-anchor="middle" class="sub">products · ai-summary · ai-category-insights</text>

  <rect class="box-ext" x="500" y="410" width="220" height="50"/>
  <text x="610" y="430" text-anchor="middle" class="label">OpenAI ChatClient</text>
  <text x="610" y="446" text-anchor="middle" class="sub">optional · gpt-5.4-nano · 3.5 s timeout</text>

  <rect class="box" x="760" y="410" width="180" height="50"/>
  <text x="850" y="430" text-anchor="middle" class="label">Micrometer</text>
  <text x="850" y="446" text-anchor="middle" class="sub">ai_calls_total · ai_fallback_total</text>

  <path class="edge" d="M500,140 L500,160" marker-end="url(#arrow)"/>
  <path class="edge" d="M150,230 L150,285" marker-end="url(#arrow)"/>
  <path class="edge" d="M370,230 L370,285" marker-end="url(#arrow)"/>
  <path class="edge" d="M610,230 L610,285" marker-end="url(#arrow)"/>

  <path class="edge" d="M370,325 C 300,330 220,320 240,305" marker-end="url(#arrow)"/>
  <path class="edge" d="M610,325 C 540,330 460,320 460,310" marker-end="url(#arrow)"/>

  <path class="edge" d="M150,325 L150,335" marker-end="url(#arrow)"/>
  <path class="edge" d="M370,325 L370,335" marker-end="url(#arrow)"/>
  <path class="edge" d="M610,325 L610,335" marker-end="url(#arrow)"/>

  <path class="edge" d="M150,365 L150,410" marker-end="url(#arrow)"/>
  <path class="edge" d="M150,310 C 230,310 250,420 280,425" marker-end="url(#arrow)"/>

  <path class="edge-dashed" d="M500,365 L610,410" marker-end="url(#arrowDashed)"/>
  <path class="edge-dashed" d="M500,365 C 540,380 380,395 370,410" marker-end="url(#arrowDashed)"/>
  <path class="edge-dashed" d="M720,350 C 800,355 830,395 850,410" marker-end="url(#arrowDashed)"/>

  <text x="20" y="510" class="lane-title">LEGEND</text>
  <rect class="box"       x="20"  y="520" width="14" height="14"/>
  <text x="40"  y="532" class="legend">core component</text>
  <rect class="box-ai"    x="160" y="520" width="14" height="14"/>
  <text x="180" y="532" class="legend">LLM-bearing component (graceful degradation)</text>
  <rect class="box-store" x="430" y="520" width="14" height="14"/>
  <text x="450" y="532" class="legend">storage / cache</text>
  <rect class="box-ext"   x="560" y="520" width="14" height="14"/>
  <text x="580" y="532" class="legend">external (optional)</text>

  <line class="edge" x1="20" y1="555" x2="50" y2="555" marker-end="url(#arrow)"/>
  <text x="60" y="559" class="legend">request / synchronous call</text>
  <line class="edge-dashed" x1="240" y1="555" x2="270" y2="555" marker-end="url(#arrowDashed)"/>
  <text x="280" y="559" class="legend">side-effect (cache write · metric · external call)</text>

  <text x="20" y="585" class="legend">Reading order: client → controller → service → (cache → repo | LLM → cache | metric).
    LLM is never on the correctness path — every gateway call has a fallback that omits the field.</text>
</svg>
