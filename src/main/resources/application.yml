spring:
  application:
    name: item-comparison-api
  datasource:
    url: jdbc:h2:mem:items;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  cache:
    type: caffeine
    cache-names:
      - products
      - ai-summary
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=5m,recordStats
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:disabled}
      chat:
        options:
          model: gpt-5.4-nano
          temperature: 0.2

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,caches
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

app:
  ai:
    timeout-ms: 3500
    daily-request-limit: 0
  errors:
    base-uri: https://api.example.com/errors

logging:
  level:
    com.hackerrank.sample: INFO
    org.hibernate.SQL: WARN
